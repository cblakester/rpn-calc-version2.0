<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#2c3040"/>
<title>RPN Calc</title>
<style>
:root{
  --chrome1:#e6e6e6;--chrome2:#bfc3c7;--chrome3:#8e9399;
  --accent:#4da3ff;--accent-glow:rgba(77,163,255,0.4);
  --green:#00c97c;--red:#e53935;--yellow:#ffb300;
  --softkey:#9575cd;--gap-color:#7a7a8a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:"Segoe UI",Roboto,Arial,sans-serif;
  background:linear-gradient(135deg,#d7d7d7,#f5f5f5 40%,#cfcfcf 70%,#f2f2f2);
  min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
  padding:24px 16px;
  padding-top:max(24px,env(safe-area-inset-top));
  padding-bottom:max(24px,env(safe-area-inset-bottom));
}
.calc{width:100%;max-width:480px;}
.display{
  background:linear-gradient(145deg,#2d3138,#1e2126);
  border-radius:14px;padding:14px 16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.35);
  color:white;margin-bottom:10px;
}
.stack-row{display:flex;justify-content:space-between;font-size:16px;opacity:0.75;padding:2px 0;}
.stack-row .lbl{opacity:0.55;min-width:28px;}
.stack-row.level1{opacity:1;font-size:19px;font-weight:600;}
.input-line{margin-top:10px;font-size:26px;font-weight:700;min-height:34px;color:#fff;letter-spacing:0.5px;}
.cursor{animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:0;}}
.status-line{margin-top:6px;font-size:12px;min-height:18px;color:var(--accent);text-shadow:0 0 8px var(--accent-glow);}
.softkeys{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:8px;}
.softkeys button{
  padding:10px 2px;font-size:12px;font-weight:700;border-radius:8px;border:none;
  background:linear-gradient(#d1c4e9,var(--softkey));color:white;
  box-shadow:0 3px 6px rgba(0,0,0,0.2);cursor:pointer;min-height:38px;line-height:1.2;
}
.softkeys button.cat-btn{background:linear-gradient(#80cbc4,#00897b);font-size:10px;}
.softkeys button.next-btn{background:linear-gradient(#ffb74d,#ef6c00);}
.softkeys button.add-btn{background:linear-gradient(#66bb6a,#2e7d32);font-size:11px;}
.softkeys button.del-btn{background:linear-gradient(#ff7b7b,#e53935);font-size:11px;}
.softkeys button:disabled{opacity:0.25;cursor:default;}
.softkeys button:not(:disabled):active{transform:scale(0.95);}
.controls{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-bottom:10px;align-items:stretch;}
select{width:100%;padding:10px;border-radius:8px;border:none;background:linear-gradient(var(--chrome1),var(--chrome2));font-weight:600;font-size:14px;cursor:pointer;}
#trimBtn{padding:10px 14px;border-radius:8px;border:none;background:linear-gradient(#5cb0ff,#2d7cff);color:white;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;}
.keypad-wrap{background:var(--gap-color);border-radius:14px;padding:10px;box-shadow:0 4px 16px rgba(0,0,0,0.25);}
.keypad{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;}
.key{
  padding:16px 4px;font-size:16px;font-weight:700;border-radius:10px;border:none;
  background:linear-gradient(var(--chrome1),var(--chrome3));box-shadow:0 4px 8px rgba(0,0,0,0.22);
  cursor:pointer;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;
}
.key:active{transform:scale(0.94);}
.key.op    {background:linear-gradient(#5cb0ff,#2d7cff);color:white;}
.key.enter {background:linear-gradient(#5dffb5,var(--green));color:#003d26;grid-column:span 2;}
.key.danger{background:linear-gradient(#ff7b7b,var(--red));color:white;}
.key.stack {background:linear-gradient(#ffe082,var(--yellow));color:#5c3e00;}
.key.shift {background:linear-gradient(#ffeb3b,#f57f17);color:#3e2000;}
.key.shift.active{background:linear-gradient(#f57f17,#ff9800);color:white;box-shadow:0 0 12px #ff980088;}
.key.units-active{box-shadow:0 0 14px #9575cd99;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);align-items:center;justify-content:center;z-index:100;}
.modal-overlay.show{display:flex;}
.modal-box{background:#2d3138;border-radius:14px;padding:22px;width:82%;max-width:340px;box-shadow:0 10px 40px rgba(0,0,0,0.5);}
.modal-box p{color:#aaa;font-size:13px;margin-bottom:12px;line-height:1.5;}
.modal-input{width:100%;padding:12px;border-radius:8px;border:2px solid var(--accent);background:#1e2126;color:white;font-size:22px;font-weight:600;outline:none;margin-bottom:14px;text-align:center;}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-btns button{padding:13px;border-radius:8px;border:none;font-size:15px;font-weight:700;cursor:pointer;}
.btn-ok {background:linear-gradient(#5dffb5,#00c97c);color:#003d26;}
.btn-cancel{background:linear-gradient(#ff7b7b,#e53935);color:white;}
.del-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.del-list button{padding:10px 14px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;background:linear-gradient(#ff7b7b,#e53935);color:white;}
</style>
</head>
<body>
<div class="calc">
  <div class="display">
    <div id="stackDisplay"></div>
    <div class="input-line" id="inputLine"></div>
    <div class="status-line" id="statusLine"></div>
  </div>
  <div class="softkeys">
    <button id="sk0" disabled>—</button>
    <button id="sk1" disabled>—</button>
    <button id="sk2" disabled>—</button>
    <button id="sk3" disabled>—</button>
    <button id="sk4" disabled>—</button>
    <button id="sk5" disabled>—</button>
  </div>
  <div class="controls">
    <select id="precision" onchange="saveSettings();render();">
      <option value="8">1/8</option>
      <option value="16" selected>1/16</option>
      <option value="32">1/32</option>
      <option value="64">1/64</option>
    </select>
    <select id="roundMode" onchange="saveSettings();render();">
      <option value="nearest">Nearest</option>
      <option value="up">Up</option>
      <option value="down">Down</option>
    </select>
    <button id="trimBtn" onclick="trimDecimal()">TRIM</button>
  </div>
  <div class="keypad-wrap">
    <div class="keypad">
      <button class="key danger" onclick="clearAll()">AC</button>
      <button class="key stack"  onclick="undo()">UNDO</button>
      <button class="key op"     id="commaBtn" onclick="toggleCommas()">1,000</button>
      <button class="key op"     style="font-size:11px;" onclick="toggleDisplayMode()">DEC/FRAC</button>
      <button class="key danger" onclick="back()">⌫</button>

      <button class="key enter"  onclick="handleEnter()">ENTER</button>
      <button class="key stack"  onclick="swap()">SWAP</button>
      <button class="key stack"  onclick="rollDown()">R↓</button>
      <button class="key danger" onclick="drop()">DROP</button>

      <button class="key op"     id="unitsBtn" onclick="toggleUnitsMode()">UNITS</button>
      <button class="key"        onclick="digit('7')">7</button>
      <button class="key"        onclick="digit('8')">8</button>
      <button class="key"        onclick="digit('9')">9</button>
      <button class="key op"     onclick="operate('div')">÷</button>

      <button class="key shift"  id="shiftBtn" onclick="toggleShift()">
        <svg width="28" height="18" viewBox="0 0 28 18" fill="none">
          <line x1="22" y1="15" x2="22" y2="6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="22" y1="6" x2="4" y2="6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          <polyline points="9,1 4,6 9,11" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </button>
      <button class="key"        onclick="digit('4')">4</button>
      <button class="key"        onclick="digit('5')">5</button>
      <button class="key"        onclick="digit('6')">6</button>
      <button class="key op"     onclick="operate('times')">×</button>

      <button class="key op"     onclick="openPasteModal()">PASTE</button>
      <button class="key"        onclick="digit('1')">1</button>
      <button class="key"        onclick="digit('2')">2</button>
      <button class="key"        onclick="digit('3')">3</button>
      <button class="key op"     onclick="operate('minus')">−</button>

      <button class="key op"     onclick="digit('/')">／</button>
      <button class="key"        onclick="digit('0')">0</button>
      <button class="key"        onclick="digit('.')">.</button>
      <button class="key"        onclick="digit(' ')">SPC</button>
      <button class="key op"     onclick="operate('plus')">+</button>
    </div>
  </div>
</div>

<!-- Paste Modal -->
<div id="pasteModal" class="modal-overlay">
  <div class="modal-box">
    <p>Long-press the field below, tap <strong style="color:white;">Paste</strong>, then press OK</p>
    <input id="pasteInput" class="modal-input" type="text" inputmode="decimal" placeholder="Paste here…"/>
    <div class="modal-btns">
      <button class="btn-ok"     onclick="confirmPaste()">OK</button>
      <button class="btn-cancel" onclick="closePasteModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Currency Edit Modal -->
<div id="editCurrModal" class="modal-overlay">
  <div class="modal-box">
    <div id="editCurrMain">
      <p>What would you like to do?</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
        <button class="btn-ok"     onclick="showAddCurr()">+ Add</button>
        <button class="btn-cancel" onclick="showDelCurr()">− Remove</button>
      </div>
      <button onclick="closeEditCurrModal()" style="width:100%;padding:10px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;background:#444;color:white;">Cancel</button>
    </div>
    <div id="editCurrAdd" style="display:none;">
      <p>Enter a 3-letter currency code (e.g. MXN, CHF)</p>
      <input id="addCurrInput" class="modal-input" type="text" maxlength="4" placeholder="USD" style="text-transform:uppercase;"/>
      <div class="modal-btns">
        <button class="btn-ok"     onclick="confirmAddCurrency()">Add</button>
        <button class="btn-cancel" onclick="showEditMain()">Back</button>
      </div>
    </div>
    <div id="editCurrDel" style="display:none;">
      <p>Tap a currency to remove it</p>
      <div id="delCurrList" class="del-list"></div>
      <button onclick="showEditMain()" style="width:100%;padding:10px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;background:#444;color:white;">Back</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
var stack=[], lastStack=null, input='';
var unitsMode='off'; // 'off'|'cat'|'units'
var shifted=false, currentCat=null, catPage=0, catPickerPage=0;
var displayMode='fraction', commaMode=false;
var acLastTap=0; // for double-tap AC detection

// ── Unit Categories ───────────────────────────────────────────────────────
var CATEGORIES=['Length','Area','Volume','Time','Speed','Mass','Power','Pressure','Temp','Currency'];

var CAT_UNITS={
  Length:   ['in','ft','yd','mi','mm','cm','m','km'],
  Area:     ['in²','ft²','mi²','mm²','cm²','m²'],
  Volume:   ['in³','ft³','gal','L','cm³','m³','tsp','tbsp','cup','fl oz','pt','qt'],
  Time:     ['ms','s','min','hr','day','wk','mo','yr'],
  Speed:    ['mph','fps','kph','m/s','knot'],
  Mass:     ['lb','oz','ton','g','kg','tonne'],
  Power:    ['hp','kW','W','BTU/hr','ft·lb/s'],
  Pressure: ['psi','bar','atm','Pa','kPa','mmHg'],
  Temp:     ['°F','°C','K'],
  Currency: [] // dynamic
};

var UNITS={
  'in':{dim:'length',f:0.0254},'ft':{dim:'length',f:0.3048},'yd':{dim:'length',f:0.9144},
  'mi':{dim:'length',f:1609.344},'mm':{dim:'length',f:0.001},'cm':{dim:'length',f:0.01},
  'm':{dim:'length',f:1},'km':{dim:'length',f:1000},
  'in²':{dim:'area',f:6.4516e-4},'ft²':{dim:'area',f:0.092903},'mi²':{dim:'area',f:2.589988e6},
  'mm²':{dim:'area',f:1e-6},'cm²':{dim:'area',f:1e-4},'m²':{dim:'area',f:1},
  'in³':{dim:'volume',f:1.6387e-5},'ft³':{dim:'volume',f:0.0283168},'gal':{dim:'volume',f:0.00378541},
  'L':{dim:'volume',f:0.001},'cm³':{dim:'volume',f:1e-6},'m³':{dim:'volume',f:1},
  'tsp':{dim:'volume',f:4.92892e-6},'tbsp':{dim:'volume',f:1.47868e-5},'cup':{dim:'volume',f:2.36588e-4},
  'fl oz':{dim:'volume',f:2.95735e-5},'pt':{dim:'volume',f:4.73176e-4},'qt':{dim:'volume',f:9.46353e-4},
  'ms':{dim:'time',f:0.001},'s':{dim:'time',f:1},'min':{dim:'time',f:60},'hr':{dim:'time',f:3600},
  'day':{dim:'time',f:86400},'wk':{dim:'time',f:604800},'mo':{dim:'time',f:2629746},'yr':{dim:'time',f:31556952},
  'mph':{dim:'speed',f:0.44704},'fps':{dim:'speed',f:0.3048},'kph':{dim:'speed',f:0.277778},
  'm/s':{dim:'speed',f:1},'knot':{dim:'speed',f:0.514444},
  'lb':{dim:'mass',f:0.453592},'oz':{dim:'mass',f:0.0283495},'ton':{dim:'mass',f:907.185},
  'g':{dim:'mass',f:0.001},'kg':{dim:'mass',f:1},'tonne':{dim:'mass',f:1000},
  'hp':{dim:'power',f:745.69987},'kW':{dim:'power',f:1000},'W':{dim:'power',f:1},
  'BTU/hr':{dim:'power',f:0.29307107},'ft·lb/s':{dim:'power',f:1.3558179},
  'psi':{dim:'pressure',f:6894.757},'bar':{dim:'pressure',f:100000},'atm':{dim:'pressure',f:101325},
  'Pa':{dim:'pressure',f:1},'kPa':{dim:'pressure',f:1000},'mmHg':{dim:'pressure',f:133.322},
  '°F':{dim:'temp',toK:function(v){return (v-32)*5/9+273.15;},fromK:function(v){return (v-273.15)*9/5+32;}},
  '°C':{dim:'temp',toK:function(v){return v+273.15;},fromK:function(v){return v-273.15;}},
  'K':{dim:'temp',toK:function(v){return v;},fromK:function(v){return v;}}
};

// ── Currency ──────────────────────────────────────────────────────────────
var DEFAULT_CURRENCIES=['USD','EUR','GBP','CAD','AUD','JPY'];
var fxRates={}, fxTimestamp=null;
var cryptoRates={}, cryptoTimestamp=null; // rates in USD
var fxStatus='';

// Map ticker → CoinGecko coin ID
var CRYPTO_IDS={
  'BTC':'bitcoin','ETH':'ethereum','SOL':'solana','BNB':'binancecoin',
  'XRP':'ripple','ADA':'cardano','DOGE':'dogecoin','DOT':'polkadot',
  'MATIC':'matic-network','LTC':'litecoin','LINK':'chainlink',
  'UNI':'uniswap','AVAX':'avalanche-2','ATOM':'cosmos','XLM':'stellar'
};

function isCrypto(code){ return !!CRYPTO_IDS[code.toUpperCase()]; }

function loadCurrencies(){
  try{
    var s=localStorage.getItem('rpn_currencies');
    if(s){var a=JSON.parse(s);if(Array.isArray(a)&&a.length){CAT_UNITS.Currency=a;return;}}
  }catch(e){}
  CAT_UNITS.Currency=DEFAULT_CURRENCIES.slice();
}
function saveCurrencies(){
  try{localStorage.setItem('rpn_currencies',JSON.stringify(CAT_UNITS.Currency));}catch(e){}
}
function loadFxRates(){
  try{
    var r=localStorage.getItem('rpn_fxRates');
    var t=localStorage.getItem('rpn_fxTime');
    if(r){fxRates=JSON.parse(r);fxTimestamp=t?new Date(t):null;}
    var cr=localStorage.getItem('rpn_cryptoRates');
    var ct=localStorage.getItem('rpn_cryptoTime');
    if(cr){cryptoRates=JSON.parse(cr);cryptoTimestamp=ct?new Date(ct):null;}
  }catch(e){}
}
function saveFxRates(){
  try{
    localStorage.setItem('rpn_fxRates',JSON.stringify(fxRates));
    localStorage.setItem('rpn_fxTime',fxTimestamp?fxTimestamp.toISOString():'');
    localStorage.setItem('rpn_cryptoRates',JSON.stringify(cryptoRates));
    localStorage.setItem('rpn_cryptoTime',cryptoTimestamp?cryptoTimestamp.toISOString():'');
  }catch(e){}
}

function fetchFxRates(){
  if(!navigator.onLine){fxStatus='Offline — cached rates';render();return;}
  fxStatus='Fetching rates…';render();

  // fetch fiat
  var fiatDone=false, cryptoDone=false;
  function checkDone(){
    if(fiatDone&&cryptoDone){
      saveFxRates();
      var ft=fxTimestamp?fxTimestamp.toLocaleTimeString():'?';
      fxStatus='Updated '+ft;
      render();
    }
  }

  fetch('https://open.er-api.com/v6/latest/USD')
    .then(function(r){return r.json();})
    .then(function(data){
      if(data&&data.rates){fxRates=data.rates;fxTimestamp=new Date();}
      fiatDone=true;checkDone();
    })
    .catch(function(){fiatDone=true;checkDone();});

  // fetch crypto — get all known coins in one call priced in USD
  var ids=Object.values(CRYPTO_IDS).join(',');
  fetch('https://api.coingecko.com/api/v3/simple/price?ids='+ids+'&vs_currencies=usd')
    .then(function(r){return r.json();})
    .then(function(data){
      // build cryptoRates keyed by ticker symbol, value = price in USD
      Object.keys(CRYPTO_IDS).forEach(function(ticker){
        var cgId=CRYPTO_IDS[ticker];
        if(data[cgId]&&data[cgId].usd){
          cryptoRates[ticker]=data[cgId].usd;
        }
      });
      cryptoTimestamp=new Date();
      cryptoDone=true;checkDone();
    })
    .catch(function(){cryptoDone=true;checkDone();});
}

// Convert between any combination of fiat and crypto
// All conversions go through USD as the common base
function convertCurrency(amt, fromCode, toCode){
  fromCode=fromCode.toUpperCase(); toCode=toCode.toUpperCase();

  // get USD value of 'from'
  var usdAmt;
  if(isCrypto(fromCode)){
    var rate=cryptoRates[fromCode];
    if(!rate){status('No rate for '+fromCode,true);return null;}
    usdAmt=amt*rate; // crypto price is already in USD
  } else {
    var rF=fxRates[fromCode];
    if(!rF){status('No rate for '+fromCode,true);return null;}
    usdAmt=amt/rF; // fxRates are relative to USD
  }

  // convert USD to 'to'
  if(isCrypto(toCode)){
    var toRate=cryptoRates[toCode];
    if(!toRate){status('No rate for '+toCode,true);return null;}
    return usdAmt/toRate;
  } else {
    var rT=fxRates[toCode];
    if(!rT){status('No rate for '+toCode,true);return null;}
    return usdAmt*rT;
  }
}

function addCurrency(code){
  code=code.toUpperCase().trim();
  if(!code)return;
  if(CAT_UNITS.Currency.indexOf(code)!==-1){status(code+' already in list',true);return;}
  if(!fxRates[code]&&!isCrypto(code)){
    status(code+' not found in rates — added anyway',false);
  } else {
    status('Added '+code);
  }
  CAT_UNITS.Currency.push(code);
  saveCurrencies();
  // jump to last page so new currency is visible
  catPage=Math.ceil(CAT_UNITS.Currency.length/3)-1;
  render();
}
function delCurrency(code){
  var idx=CAT_UNITS.Currency.indexOf(code);
  if(idx===-1)return;
  CAT_UNITS.Currency.splice(idx,1);saveCurrencies();
  var tp=Math.ceil(CAT_UNITS.Currency.length/4)||1;
  if(catPage>=tp)catPage=Math.max(0,tp-1);
  status('Removed '+code);render();
}

// ── Helpers ───────────────────────────────────────────────────────────────
function el(id){return document.getElementById(id);}
function gcd(a,b){return b?gcd(b,a%b):a;}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Undo ──────────────────────────────────────────────────────────────────
function saveUndo(){lastStack=stack.map(function(i){return {value:i.value,unit:i.unit,decPlaces:i.decPlaces};});}
function undo(){
  if(!lastStack){status('Nothing to undo',true);return;}
  stack=lastStack;lastStack=null;input='';status('Undone');render();
}

// ── Format ────────────────────────────────────────────────────────────────
function fmtDecimal(val,places){
  if(places!==null&&places!==undefined){
    var s=val.toFixed(places);
    if(s.indexOf('.')!==-1)s=s.replace(/0+$/,'').replace(/\.$/,'');
    return s||'0';
  }
  return parseFloat(val.toPrecision(10)).toString()||'0';
}
function addCommas(s){
  return s.replace(/^(-?\d+)/,function(n){return n.replace(/\B(?=(\d{3})+(?!\d))/g,',');});
}
function fmtNum(val,decPlaces){
  if(!isFinite(val))return 'ERR';
  if(displayMode==='decimal')return fmtDecimal(val,decPlaces);
  var denom=parseInt(el('precision').value)||16;
  var rm=el('roundMode').value;
  var n=val*denom;
  n=rm==='nearest'?Math.round(n):rm==='up'?Math.ceil(n):Math.floor(n);
  if(n===0)return '0';
  var sign=n<0?'-':'';n=Math.abs(n);
  var g=gcd(n,denom),nr=n/g,dr=denom/g;
  var whole=Math.floor(nr/dr),rem=nr%dr;
  if(rem===0)return sign+whole;
  if(whole===0)return sign+rem+'/'+dr;
  return sign+whole+' '+rem+'/'+dr;
}
function fmtVal(item){
  var s=fmtNum(item.value,item.decPlaces);
  if(commaMode)s=addCommas(s);
  return s+(item.unit?' '+item.unit:'');
}
function status(msg,isErr){
  var e=el('statusLine');
  e.textContent=msg;
  e.style.color=isErr?'#ff6e6e':'';
  e.style.textShadow=isErr?'0 0 8px rgba(255,80,80,0.5)':'';
}

// ── Softkeys ──────────────────────────────────────────────────────────────
function renderSoftkeys(){
  var ids=['sk0','sk1','sk2','sk3','sk4','sk5'];
  // reset all
  for(var i=0;i<6;i++){
    var b=el(ids[i]);
    b.textContent='—';b.disabled=true;b.className='';b.onclick=null;b.style.fontSize='';
  }
  if(unitsMode==='off')return;

  if(unitsMode==='cat'){
    var start=catPickerPage*5;
    var cats=CATEGORIES.slice(start,start+5);
    for(var j=0;j<5;j++){
      var btn=el(ids[j]);
      var lbl=cats[j]||null;
      btn.textContent=lbl||'—';btn.disabled=!lbl;
      btn.className=lbl?'cat-btn':'';
      btn.onclick=lbl?(function(ix){return function(){selectCategory(ix);};})(j):null;
    }
    if(start+5<CATEGORIES.length){
      var a=el('sk5');a.textContent='→';a.disabled=false;a.className='next-btn';
      a.onclick=function(){catPickerPage++;render();};
    }
    return;
  }

  // unitsMode==='units'
  if(currentCat==='Currency'){
    var all=CAT_UNITS.Currency;
    var tp=Math.ceil(all.length/4)||1;
    if(catPage>=tp)catPage=Math.max(0,tp-1);
    var cs=catPage*4;
    var slice=all.slice(cs,cs+4);
    // slots 0-3: currencies
    for(var k=0;k<4;k++){
      var cb=el(ids[k]);
      var cu=slice[k]||null;
      cb.textContent=cu||'—';cb.disabled=!cu;cb.className='';
      cb.onclick=cu?(function(ix){return function(){tapCurrency(ix);};})(k):null;
    }
    // slot 4: → if multiple pages, else dimmed
    var skN=el('sk4');
    if(tp>1){
      skN.textContent='→';skN.disabled=false;skN.className='next-btn';skN.style.fontSize='16px';
      skN.onclick=function(){catPage=(catPage+1)%tp;render();};
    } else {
      skN.textContent='—';skN.disabled=true;skN.className='';skN.style.fontSize='';skN.onclick=null;
    }
    // slot 5: +ADD always visible; long-press not easy on mobile so we use a small combined button
    // Actually show +ADD in slot 4 when single page, −DEL in slot 5 always
    // Redo: slot 4=+ADD always, slot 5=−DEL always, paging handled by → replacing slot 3 when needed
    // Simplest clean fix: 3 currency slots + → (if needed) + +ADD + −DEL
    // Reset slots 0-2 for currencies, slot 3 for → or empty, slot 4=+ADD, slot 5=−DEL
    for(var r=0;r<6;r++){
      var rb=el(ids[r]);rb.textContent='—';rb.disabled=true;rb.className='';rb.style.fontSize='';rb.onclick=null;
    }
    var perPage=tp>1?3:4;
    var tp2=Math.ceil(all.length/perPage)||1;
    if(catPage>=tp2)catPage=Math.max(0,tp2-1);
    var cs2=catPage*perPage;
    var slice2=all.slice(cs2,cs2+perPage);
    for(var k2=0;k2<perPage;k2++){
      var cb2=el(ids[k2]);
      var cu2=slice2[k2]||null;
      cb2.textContent=cu2||'—';cb2.disabled=!cu2;cb2.className='';
      cb2.onclick=cu2?(function(ix){return function(){tapCurrency(ix);};})(k2):null;
    }
    // slot 4: → if multiple pages, else empty
    var skArrow=el('sk4');
    if(tp2>1){
      skArrow.textContent='→';skArrow.disabled=false;skArrow.className='next-btn';skArrow.style.fontSize='16px';
      skArrow.onclick=function(){catPage=(catPage+1)%tp2;render();};
    }
    // slot 5: EDIT always
    var skEdit=el('sk5');
    skEdit.textContent='EDIT';skEdit.disabled=false;skEdit.className='add-btn';skEdit.style.fontSize='11px';
    skEdit.onclick=openEditCurrModal;
  } else {
    // Normal category
    var all2=CAT_UNITS[currentCat];
    var s2=catPage*5;
    var slice2=all2.slice(s2,s2+5);
    for(var m=0;m<5;m++){
      var ub=el(ids[m]);
      var ul=slice2[m]||null;
      ub.textContent=ul||'—';ub.disabled=!ul;ub.className='';
      ub.onclick=ul?(function(ix){return function(){tapUnit(ix);};})(m):null;
    }
    if(s2+5<all2.length){
      var sk5=el('sk5');sk5.textContent='→';sk5.disabled=false;sk5.className='next-btn';
      sk5.onclick=function(){catPage=(catPage+1)%Math.ceil(all2.length/5);render();};
    }
  }
}

function selectCategory(idx){
  var cat=CATEGORIES[catPickerPage*5+idx];
  if(!cat)return;
  currentCat=cat;catPage=0;unitsMode='units';
  if(currentCat==='Currency')fetchFxRates();
  render();
}

function tapUnit(idx){
  var unit=CAT_UNITS[currentCat][catPage*5+idx];
  if(!unit)return;
  if(!commitInput())return;
  if(!stack.length){status('Stack empty',true);return;}
  var x=stack[stack.length-1];
  if(shifted){
    var from=UNITS[x.unit],to=UNITS[unit];
    if(!x.unit){status('No unit to convert',true);return;}
    if(!from||!to){status('Unknown unit',true);return;}
    if(from.dim!==to.dim){status('Incompatible dimensions',true);return;}
    saveUndo();
    var base=from.toK?from.toK(x.value):x.value*from.f;
    x.value=to.fromK?to.fromK(base):base/to.f;
    x.unit=unit;status('Converted → '+unit);shifted=false;
  } else {
    saveUndo();x.unit=unit;status('Attached '+unit);
  }
  render();
}

function tapCurrency(idx){
  var code=CAT_UNITS.Currency[catPage*3+idx];
  if(!code)return;
  if(!commitInput())return;
  if(!stack.length){status('Stack empty',true);return;}
  var x=stack[stack.length-1];
  if(shifted){
    if(!x.unit){status('No unit to convert',true);return;}
    var result=convertCurrency(x.value,x.unit,code);
    if(result===null)return;
    saveUndo();x.value=result;x.unit=code;
    status('Converted → '+code);shifted=false;
  } else {
    saveUndo();x.unit=code;status('Attached '+code);
  }
  render();
}

// ── Render ────────────────────────────────────────────────────────────────
function render(){
  var len=stack.length,html='';
  for(var lvl=5;lvl>=1;lvl--){
    var idx=len-lvl;
    var cls=lvl===1?'stack-row level1':'stack-row';
    var val=idx>=0?escHtml(fmtVal(stack[idx])):'';
    html+='<div class="'+cls+'"><span class="lbl">X'+lvl+'</span><span>'+val+'</span></div>';
  }
  el('stackDisplay').innerHTML=html;
  var di=escHtml(input).replace(/ /g,'<span style="color:#1e2126;">·</span>');
  el('inputLine').innerHTML=(input?di:'')+' <span class="cursor">▎</span>';
  el('shiftBtn').classList.toggle('active',shifted);
  el('unitsBtn').classList.toggle('units-active',unitsMode!=='off');

  if(unitsMode==='off'){
    status('');
  } else if(unitsMode==='cat'){
    var tcp=Math.ceil(CATEGORIES.length/5);
    status('Pick category'+(tcp>1?' (p.'+(catPickerPage+1)+'/'+tcp+')':'')+' →');
  } else if(currentCat==='Currency'){
    var tp2=Math.ceil(CAT_UNITS.Currency.length/3)||1;
    var cp=tp2>1?' (p.'+(catPage+1)+'/'+tp2+')':'';
    var fx=fxStatus?' · '+fxStatus:'';
    status((shifted?'SHIFT: convert':'Attach currency')+cp+fx);
  } else {
    var tp3=Math.ceil(CAT_UNITS[currentCat].length/5);
    var up=tp3>1?' (p.'+(catPage+1)+'/'+tp3+')':'';
    status((shifted?'SHIFT: convert':'Attach unit')+' → '+currentCat+up);
  }

  renderSoftkeys();
  saveSettings();
}

// ── Input ─────────────────────────────────────────────────────────────────
function isCompleteMixedNumber(s){
  // matches "whole frac/denom" e.g. "2 1/2"
  return /^\-?\d+\s+\d+\/\d+$/.test(s.trim());
}

function digit(c){
  var token=input.split(' ').pop();
  if(c==='/'&&token.indexOf('/')!==-1)return;
  if(c==='.'&&token.indexOf('.')!==-1)return;
  if(c===' '&&input.slice(-1)===' ')return;

  // auto-push on SPACE if input is already a complete mixed number
  if(c===' '&&isCompleteMixedNumber(input)){
    if(!commitInput())return;
    render();return;
  }

  input+=c;render();
}
function back(){input=input.replace(/\s$/,'').slice(0,-1);render();}
function parseToken(s){
  if(s.indexOf('/')!==-1){var p=s.split('/');var n=parseFloat(p[0]),d=parseFloat(p[1]);return d?n/d:NaN;}
  return parseFloat(s);
}
function parseInput(s){
  s=s.trim();if(!s)return[];
  var parts=s.split(/\s+/);
  if(parts.length===2&&parts[1].indexOf('/')!==-1){
    var w=parseFloat(parts[0]),f=parseToken(parts[1]);
    if(!isFinite(w)||!isFinite(f))return null;
    return [{value:w+(w<0?-f:f),unit:null,decPlaces:null}];
  }
  var res=[];
  for(var i=0;i<parts.length;i++){
    var v=parseToken(parts[i]);if(!isFinite(v))return null;
    res.push({value:v,unit:null,decPlaces:null});
  }
  return res;
}
function commitInput(){
  if(!input.trim())return true;
  var vals=parseInput(input);
  if(!vals){status('Invalid input',true);return false;}
  for(var i=0;i<vals.length;i++)stack.push(vals[i]);
  input='';return true;
}

// ── Stack Ops ─────────────────────────────────────────────────────────────
function handleEnter(){
  saveUndo();
  if(input.trim()){if(!commitInput())return;}
  else if(stack.length){var t=stack[stack.length-1];stack.push({value:t.value,unit:t.unit,decPlaces:t.decPlaces});}
  render();
}
function drop(){saveUndo();if(input.trim())input='';else if(stack.length)stack.pop();render();}
function swap(){
  if(!commitInput())return;
  if(stack.length<2){status('Need ≥ 2 values',true);return;}
  saveUndo();var n=stack.length,tmp=stack[n-1];stack[n-1]=stack[n-2];stack[n-2]=tmp;render();
}
function rollDown(){
  if(!commitInput())return;if(stack.length<2)return;
  saveUndo();stack.unshift(stack.pop());render();
}
function clearAll(){
  var now=Date.now();
  var doubleTap=now-acLastTap<400;
  acLastTap=now;
  saveUndo();
  stack=[];input='';
  if(doubleTap){
    // full reset including units
    unitsMode='off';shifted=false;currentCat=null;catPage=0;catPickerPage=0;
    status('Full reset');
  } else {
    status('Stack cleared');
  }
  render();
}

// ── Arithmetic ────────────────────────────────────────────────────────────
function operate(op){
  if(!commitInput())return;
  if(stack.length<2){status('Need ≥ 2 values',true);return;}
  var x1=stack[stack.length-1],x2=stack[stack.length-2];
  if(op==='div'&&x1.value===0){status('Division by zero',true);return;}
  saveUndo();
  var r={value:0,unit:null,decPlaces:null};
  if(op==='plus'||op==='minus'){
    var tb=function(u){return UNITS[u]?UNITS[u].f:1;};
    if(x2.unit&&x1.unit){
      var u1=UNITS[x2.unit],u2=UNITS[x1.unit];
      if(!u1||!u2||u1.dim!==u2.dim){status('Incompatible units',true);return;}
      r.value=(op==='plus'?x2.value*tb(x2.unit)+x1.value*tb(x1.unit):x2.value*tb(x2.unit)-x1.value*tb(x1.unit))/tb(x2.unit);
      r.unit=x2.unit;
    } else {
      r.value=op==='plus'?x2.value+x1.value:x2.value-x1.value;r.unit=x2.unit||x1.unit;
    }
  } else if(op==='times'){r.value=x2.value*x1.value;}
  else if(op==='div'){r.value=x2.value/x1.value;}
  stack.splice(stack.length-2,2,r);render();
}

// ── Trim Decimal ──────────────────────────────────────────────────────────
function trimDecimal(){
  if(displayMode!=='decimal'){status('Switch to decimal mode first',true);return;}
  if(!stack.length){status('Stack empty',true);return;}
  var x=stack[stack.length-1];
  if(x.decPlaces===null||x.decPlaces===undefined){
    var s=parseFloat(x.value.toPrecision(10)).toString();
    var dot=s.indexOf('.');x.decPlaces=dot===-1?0:s.length-dot-1;
  }
  if(x.decPlaces===0){status('Already a whole number',true);return;}
  x.decPlaces--;
  status('Trimmed to '+x.decPlaces+' decimal'+(x.decPlaces!==1?'s':''));render();
}

// ── Mode Toggles ──────────────────────────────────────────────────────────
function toggleDisplayMode(){
  displayMode=displayMode==='fraction'?'decimal':'fraction';
  stack.forEach(function(i){i.decPlaces=null;});
  saveSettings();status('Display: '+displayMode);render();
}
function toggleCommas(){
  commaMode=!commaMode;
  el('commaBtn').style.boxShadow=commaMode?'0 0 12px #4da3ff88':'';
  saveSettings();status('Commas: '+(commaMode?'on':'off'));render();
}
function toggleShift(){shifted=!shifted;render();}
function toggleUnitsMode(){
  if(unitsMode==='off'){unitsMode=currentCat?'units':'cat';}
  else if(unitsMode==='units'){unitsMode='cat';}
  else{unitsMode='off';shifted=false;catPickerPage=0;}
  render();
}

// ── Paste Modal ───────────────────────────────────────────────────────────
function openPasteModal(){
  el('pasteInput').value='';
  el('pasteModal').classList.add('show');
  setTimeout(function(){el('pasteInput').focus();},100);
}
function closePasteModal(){el('pasteModal').classList.remove('show');}
function confirmPaste(){
  var text=el('pasteInput').value.trim();
  closePasteModal();
  if(!text){status('Nothing to paste',true);return;}
  var vals=parseInput(text.replace(/,/g,''));
  if(!vals||!vals.length){status('Invalid paste value',true);return;}
  saveUndo();for(var i=0;i<vals.length;i++)stack.push(vals[i]);
  status('Pasted: '+text);render();
}
el('pasteModal').addEventListener('click',function(e){if(e.target===el('pasteModal'))closePasteModal();});
el('pasteInput').addEventListener('keydown',function(e){if(e.key==='Enter')confirmPaste();});

// ── Currency Edit Modal ───────────────────────────────────────────────────
function openEditCurrModal(){ showEditMain(); el('editCurrModal').classList.add('show'); }
function closeEditCurrModal(){ el('editCurrModal').classList.remove('show'); }
function showEditMain(){
  el('editCurrMain').style.display='';
  el('editCurrAdd').style.display='none';
  el('editCurrDel').style.display='none';
}
function showAddCurr(){
  el('editCurrMain').style.display='none';
  el('editCurrAdd').style.display='';
  el('addCurrInput').value='';
  setTimeout(function(){el('addCurrInput').focus();},100);
}
function showDelCurr(){
  el('editCurrMain').style.display='none';
  el('editCurrDel').style.display='';
  var list=el('delCurrList'); list.innerHTML='';
  CAT_UNITS.Currency.forEach(function(code){
    var btn=document.createElement('button');
    btn.textContent=code;
    btn.onclick=function(){delCurrency(code);closeEditCurrModal();};
    list.appendChild(btn);
  });
}
function confirmAddCurrency(){
  var code=el('addCurrInput').value.toUpperCase().trim();
  closeEditCurrModal();
  if(code)addCurrency(code);
}
el('editCurrModal').addEventListener('click',function(e){if(e.target===el('editCurrModal'))closeEditCurrModal();});
el('addCurrInput').addEventListener('keydown',function(e){if(e.key==='Enter')confirmAddCurrency();});

// ── Keyboard ──────────────────────────────────────────────────────────────
document.addEventListener('keydown',function(e){
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  if(el('pasteModal').classList.contains('show'))return;
  if(el('editCurrModal').classList.contains('show'))return;
  switch(e.key){
    case '0':case '1':case '2':case '3':case '4':
    case '5':case '6':case '7':case '8':case '9':digit(e.key);break;
    case '.':digit('.');break;
    case '/':e.preventDefault();digit('/');break;
    case ' ':e.preventDefault();digit(' ');break;
    case 'Enter':handleEnter();break;
    case 'Backspace':back();break;
    case 'Escape':clearAll();break;
    case '+':operate('plus');break;
    case '-':operate('minus');break;
    case '*':operate('times');break;
    case 's':case 'S':swap();break;
    case 'r':case 'R':rollDown();break;
    case 'd':case 'D':drop();break;
    case 'f':case 'F':toggleDisplayMode();break;
    case 'c':case 'C':toggleCommas();break;
    case 'u':case 'U':undo();break;
    case 'p':case 'P':openPasteModal();break;
    case 't':case 'T':trimDecimal();break;
  }
});

// ── PWA ───────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js',{scope:'./'})
    .catch(function(e){console.warn('SW:',e);});
}

// ── Persist ───────────────────────────────────────────────────────────────
function saveSettings(){
  try{
    localStorage.setItem('rpn_precision',el('precision').value);
    localStorage.setItem('rpn_roundMode',el('roundMode').value);
    localStorage.setItem('rpn_displayMode',displayMode);
    localStorage.setItem('rpn_commaMode',commaMode?'1':'0');
    localStorage.setItem('rpn_stack',JSON.stringify(stack));
    if(currentCat)localStorage.setItem('rpn_lastCat',currentCat);
  }catch(e){}
}
function loadSettings(){
  try{
    var p=localStorage.getItem('rpn_precision');
    var r=localStorage.getItem('rpn_roundMode');
    var d=localStorage.getItem('rpn_displayMode');
    var c=localStorage.getItem('rpn_commaMode');
    var s=localStorage.getItem('rpn_stack');
    var cat=localStorage.getItem('rpn_lastCat');
    if(p)el('precision').value=p;
    if(r)el('roundMode').value=r;
    if(d)displayMode=d;
    if(c!==null){commaMode=c==='1';if(commaMode)el('commaBtn').style.boxShadow='0 0 12px #4da3ff88';}
    if(s){var parsed=JSON.parse(s);if(Array.isArray(parsed))stack=parsed;}
    if(cat)currentCat=cat;
  }catch(e){}
}

document.querySelectorAll('.key').forEach(function(btn){
  btn.addEventListener('touchstart',function(e){e.preventDefault();btn.click();},{passive:false});
});

loadCurrencies();
loadFxRates();
loadSettings();
render();
</script>
